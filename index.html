<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Jumper Turbo - Music Edition</title>
    <style>
        :root { --primary: #3498db; --bg: #2980b9; }
        body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; touch-action: none; }
        
        #ui-layer { position: fixed; top: 20px; left: 20px; pointer-events: none; color: white; z-index: 5; }
        .stats { font-size: 24px; text-shadow: 3px 3px 0px #2c3e50; display: flex; gap: 20px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 10px; }
        
        #overlay { 
            position: fixed; inset: 0; background: rgba(26, 26, 46, 0.9); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; transition: opacity 0.3s;
        }
        .title { font-size: 60px; color: #f1c40f; margin-bottom: 10px; text-shadow: 4px 4px 0 #e67e22; }
        .subtitle { color: white; margin-bottom: 30px; font-size: 18px; opacity: 0.8; }
        .btn-start { 
            padding: 20px 60px; background: #2ecc71; color: white; border: none; 
            border-radius: 15px; font-size: 28px; cursor: pointer; 
            box-shadow: 0 8px 0 #27ae60; transition: transform 0.1s;
        }
        .btn-start:active { transform: translateY(4px); box-shadow: 0 4px 0 #27ae60; }

        .controls {
            position: fixed; bottom: 40px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 50px; box-sizing: border-box;
            pointer-events: none;
        }
        .btn-touch {
            width: 80px; height: 80px; background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px); border: 2px solid white; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; color: white;
            font-size: 40px; pointer-events: auto; user-select: none;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="stats">
        <div class="stat-box">LVL: <span id="lvl-val">1</span></div>
        <div class="stat-box">COINS: <span id="coin-val">0</span>/30</div>
        <div class="stat-box">LIVES: <span id="life-val">3</span></div>
    </div>
</div>

<div id="overlay">
    <h1 class="title">PIXEL JUMPER</h1>
    <p class="subtitle">Atteins le drapeau rouge !</p>
    <button class="btn-start" onclick="startGame()">JOUER</button>
</div>

<canvas id="game"></canvas>

<div class="controls">
    <div style="display: flex; gap: 20px;">
        <div class="btn-touch" id="btn-left">←</div>
        <div class="btn-touch" id="btn-right">→</div>
    </div>
    <div class="btn-touch" id="btn-jump">UP</div>
</div>

<script>
// --- AUDIO ENGINE ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let bgmInterval;

function playNote(freq, type, duration, volume, startTime) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(volume, startTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration);
}

function playJumpSound() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    playNote(150 + Math.random() * 50, 'square', 0.2, 0.1, audioCtx.currentTime);
}

function playCoinSound() {
    playNote(987.77, 'square', 0.1, 0.1, audioCtx.currentTime);
    playNote(1318.51, 'square', 0.2, 0.1, audioCtx.currentTime + 0.05);
}

function playLifeUpSound() {
    const now = audioCtx.currentTime;
    [523, 659, 783, 1046].forEach((f, i) => playNote(f, 'square', 0.3, 0.1, now + i*0.1));
}

function playLandSound() {
    playNote(80, 'sine', 0.1, 0.2, audioCtx.currentTime);
}

function playWinMusic() {
    const now = audioCtx.currentTime;
    const winNotes = [523, 659, 783, 1046, 783, 1046];
    winNotes.forEach((f, i) => {
        playNote(f, 'triangle', 0.4, 0.05, now + i * 0.12);
    });
}

function startMusic() {
    if (bgmInterval) clearInterval(bgmInterval);
    const melody = [
        261, 329, 392, 523, 392, 329, 261, 0,
        349, 440, 523, 587, 523, 440, 349, 0,
        392, 493, 587, 659, 587, 493, 392, 392,
        523, 0, 523, 493, 440, 392, 349, 329,
        293, 329, 349, 392, 261, 0, 329, 392,
        523, 659, 523, 0
    ];
    let step = 0;
    bgmInterval = setInterval(() => {
        if (gameState !== 'PLAYING') return;
        const freq = melody[step % melody.length];
        if (freq > 0) {
            playNote(freq, 'square', 0.15, 0.02, audioCtx.currentTime);
        }
        step++;
    }, 150);
}

// --- PARTICLES ENGINE ---
let particles = [];
function createParticles(x, y, color, count = 8) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            life: 1.0,
            size: Math.random() * 5 + 2,
            color
        });
    }
}

// --- GAME LOGIC ---
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let gameState = 'MENU';
let coins = 0;
let lives = 3;
let currentLevel = 1;
let camX = 0;

const config = { gravity: 0.8, friction: 0.8, speed: 8, jump: -18 };

class Player {
    constructor() { this.w = 40; this.h = 40; this.reset(); }
    reset() {
        this.x = 100; this.y = 200;
        this.vx = 0; this.vy = 0;
        this.onGround = false;
        this.dir = 1; this.stretch = 1; this.squish = 1;  
    }
    draw() {
        ctx.save();
        ctx.translate(this.x + this.w/2 - camX, this.y + this.h/2);
        ctx.scale(this.dir * this.stretch, this.squish);
        ctx.fillStyle = "#3498db";
        ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
        ctx.fillStyle = "white"; ctx.fillRect(5, -10, 10, 10);
        ctx.restore();
    }
    update() {
        this.stretch += (1 - this.stretch) * 0.2;
        this.squish += (1 - this.squish) * 0.2;
    }
}

class Level {
    constructor() {
        this.platforms = [];
        this.clouds = [];
        this.stars = [];
        this.mountains = [];
        this.coins = [];
        this.goal = { x: 0, y: 0 };
    }
    generate(lvl) {
        this.platforms = [];
        this.clouds = [];
        this.stars = [];
        this.mountains = [];
        this.coins = [];
        
        // Background elements
        for(let i=0; i<50; i++) {
            this.stars.push({x: Math.random() * 2000, y: Math.random() * 600, r: Math.random() * 2});
        }
        for(let i=0; i<5; i++) {
            this.mountains.push({x: i * 500, w: 600, h: 200 + Math.random() * 200});
        }

        let curX = 0;
        let curY = window.innerHeight - 150;
        this.platforms.push({ x: 0, y: curY, w: 500, h: 600 });
        
        const numPlatforms = 10 + lvl * 2;
        for(let i=0; i < numPlatforms; i++) {
            curX += 200 + Math.random() * 150;
            curY += (Math.random() - 0.5) * 250;
            curY = Math.max(200, Math.min(window.innerHeight - 100, curY));
            let w = 120 + Math.random() * 100;
            this.platforms.push({ x: curX, y: curY, w: w, h: 600 });
            
            if(Math.random() > 0.3) {
                this.coins.push({ x: curX + w/2, y: curY - 40, collected: false, anim: Math.random() * Math.PI });
            }
            this.clouds.push({ x: curX + Math.random() * 400, y: Math.random() * 200, s: 0.2 + Math.random() * 0.5 });
        }
        const last = this.platforms[this.platforms.length - 1];
        this.goal = { x: last.x + 50, y: last.y - 100 };
    }
    draw() {
        // Draw Stars
        ctx.fillStyle = "white";
        this.stars.forEach(s => {
            ctx.globalAlpha = 0.5 + Math.sin(Date.now()*0.001 + s.x)*0.5;
            ctx.beginPath(); ctx.arc(s.x - (camX * 0.05) % 2000, s.y, s.r, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        // Draw Mountains (Parallax)
        this.mountains.forEach(m => {
            ctx.fillStyle = "#16213e";
            ctx.beginPath();
            ctx.moveTo(m.x - camX * 0.1, canvas.height);
            ctx.lineTo(m.x + m.w/2 - camX * 0.1, canvas.height - m.h);
            ctx.lineTo(m.x + m.w - camX * 0.1, canvas.height);
            ctx.fill();
        });

        this.clouds.forEach(c => {
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            ctx.beginPath(); ctx.arc(c.x - camX * c.s, c.y, 40, 0, Math.PI * 2); ctx.fill();
        });

        this.platforms.forEach(p => {
            ctx.fillStyle = "#2c3e50"; ctx.fillRect(p.x - camX, p.y, p.w, p.h);
            ctx.fillStyle = "#2ecc71"; ctx.fillRect(p.x - camX, p.y, p.w, 10);
        });

        this.coins.forEach(c => {
            if(!c.collected) {
                c.anim += 0.1;
                let bounce = Math.sin(c.anim) * 5;
                ctx.fillStyle = "#f1c40f";
                ctx.beginPath();
                ctx.ellipse(c.x - camX, c.y + bounce, 12, 18, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = "#d4ac0d"; ctx.lineWidth = 2; ctx.stroke();
            }
        });

        ctx.fillStyle = "#e74c3c";
        ctx.fillRect(this.goal.x - camX, this.goal.y, 10, 100);
        ctx.beginPath();
        ctx.moveTo(this.goal.x - camX + 10, this.goal.y);
        ctx.lineTo(this.goal.x - camX + 60, this.goal.y + 25);
        ctx.lineTo(this.goal.x - camX + 10, this.goal.y + 50);
        ctx.fill();
    }
}

const player = new Player();
const world = new Level();
const keys = { left: false, right: false };

function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('overlay').style.display = 'none';
    coins = 0; lives = 3; currentLevel = 1;
    updateUI();
    resetLevel();
    gameState = 'PLAYING';
    startMusic();
    requestAnimationFrame(loop);
}

function resetLevel() {
    player.reset();
    world.generate(currentLevel);
    camX = 0;
}

function updateUI() {
    document.getElementById('coin-val').innerText = coins;
    document.getElementById('life-val').innerText = lives;
    document.getElementById('lvl-val').innerText = currentLevel;
}

window.onkeydown = e => {
    if(e.code === 'ArrowLeft') keys.left = true;
    if(e.code === 'ArrowRight') keys.right = true;
    if(e.code === 'Space' || e.code === 'ArrowUp') jump();
};
window.onkeyup = e => {
    if(e.code === 'ArrowLeft') keys.left = false;
    if(e.code === 'ArrowRight') keys.right = false;
};

const btnBind = (id, k) => {
    const el = document.getElementById(id);
    if(!el) return;
    el.ontouchstart = (e) => { e.preventDefault(); if(k==='jump') jump(); else keys[k]=true; };
    el.ontouchend = () => { if(k!=='jump') keys[k]=false; };
};
btnBind('btn-left', 'left'); btnBind('btn-right', 'right'); btnBind('btn-jump', 'jump');

function jump() {
    if(player.onGround) {
        playJumpSound();
        createParticles(player.x + player.w/2, player.y + player.h, "white", 12);
        player.vy = config.jump;
        player.onGround = false;
        player.stretch = 0.6; player.squish = 1.4;
    }
}

function update() {
    if(gameState !== 'PLAYING') return;
    if(keys.left) { player.vx = -config.speed; player.dir = -1; }
    else if(keys.right) { player.vx = config.speed; player.dir = 1; }
    else { player.vx *= config.friction; }
    player.vy += config.gravity;
    player.x += player.vx; player.y += player.vy;
    player.update();

    let grounded = false;
    world.platforms.forEach(p => {
        if(player.x + player.w > p.x && player.x < p.x + p.w &&
           player.y + player.h > p.y && player.y + player.h < p.y + 50 && player.vy > 0) {
            if(!player.onGround) { 
                playLandSound(); 
                createParticles(player.x + player.w/2, p.y, "#2ecc71", 8);
                player.squish = 0.7; player.stretch = 1.3; 
            }
            player.y = p.y - player.h; player.vy = 0; grounded = true;
        }
    });
    player.onGround = grounded;

    world.coins.forEach(c => {
        if(!c.collected && Math.hypot(player.x + 20 - c.x, player.y + 20 - c.y) < 40) {
            c.collected = true;
            coins++;
            playCoinSound();
            createParticles(c.x, c.y, "#f1c40f", 10);
            if(coins >= 30) { coins = 0; lives++; playLifeUpSound(); }
            updateUI();
        }
    });

    // Update Particles
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) particles.splice(i, 1);
    });

    camX += (player.x - canvas.width/4 - camX) * 0.1;

    if(player.x > world.goal.x) {
        playWinMusic();
        currentLevel++;
        updateUI();
        resetLevel();
    }

    if(player.y > canvas.height + 100) {
        lives--;
        updateUI();
        if(lives <= 0) {
            gameState = 'MENU';
            document.getElementById('overlay').style.display = 'flex';
            document.querySelector('.title').innerText = "GAME OVER";
        } else {
            player.reset();
        }
    }
}

function loop() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    update();
    world.draw();
    
    // Draw Particles
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - camX, p.y, p.size, p.size);
    });
    ctx.globalAlpha = 1.0;

    player.draw();
    if(gameState === 'PLAYING') requestAnimationFrame(loop);
}
</script>
</body>
</html>
