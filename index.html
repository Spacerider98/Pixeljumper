<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Jumper Turbo</title>
    <style>
        :root { --primary: #3498db; --bg: #2980b9; }
        body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; touch-action: none; }
        
        #ui-layer { position: fixed; top: 20px; left: 20px; pointer-events: none; color: white; z-index: 5; }
        .stats { font-size: 24px; text-shadow: 3px 3px 0px #2c3e50; }
        
        #overlay { 
            position: fixed; inset: 0; background: rgba(26, 26, 46, 0.9); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; transition: opacity 0.3s;
        }
        .title { font-size: 60px; color: #f1c40f; margin-bottom: 10px; text-shadow: 4px 4px 0 #e67e22; }
        .subtitle { color: white; margin-bottom: 30px; font-size: 18px; opacity: 0.8; }
        .btn-start { 
            padding: 20px 60px; background: #2ecc71; color: white; border: none; 
            border-radius: 15px; font-size: 28px; cursor: pointer; 
            box-shadow: 0 8px 0 #27ae60; transition: transform 0.1s;
        }
        .btn-start:active { transform: translateY(4px); box-shadow: 0 4px 0 #27ae60; }

        .controls {
            position: fixed; bottom: 40px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 50px; box-sizing: border-box;
            pointer-events: none;
        }
        .btn-touch {
            width: 80px; height: 80px; background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px); border: 2px solid white; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; color: white;
            font-size: 40px; pointer-events: auto; user-select: none;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="stats">SCORE: <span id="score-val">0</span></div>
</div>

<div id="overlay">
    <h1 class="title">PIXEL JUMPER</h1>
    <p class="subtitle">Atteins le drapeau rouge !</p>
    <button class="btn-start" onclick="startGame()">JOUER</button>
</div>

<canvas id="game"></canvas>

<div class="controls">
    <div style="display: flex; gap: 20px;">
        <div class="btn-touch" id="btn-left">←</div>
        <div class="btn-touch" id="btn-right">→</div>
    </div>
    <div class="btn-touch" id="btn-jump">UP</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let gameState = 'MENU';
let score = 0;
let camX = 0;

const config = {
    gravity: 0.8,
    friction: 0.8,
    speed: 8,
    jump: -18
};

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 1.0;
        this.color = color;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.life -= 0.05;
    }
}

class Player {
    constructor() {
        this.w = 40; this.h = 40;
        this.reset();
    }
    reset() {
        this.x = 100; this.y = 200;
        this.vx = 0; this.vy = 0;
        this.onGround = false;
        this.dir = 1;
        this.stretch = 1; // Effet visuel
        this.squish = 1;  // Effet visuel
    }
    draw() {
        ctx.save();
        ctx.translate(this.x + this.w/2 - camX, this.y + this.h/2);
        ctx.scale(this.dir * this.stretch, this.squish);
        
        // Corps avec dégradé
        const grd = ctx.createLinearGradient(-this.w/2, -this.h/2, this.w/2, this.h/2);
        grd.addColorStop(0, "#3498db");
        grd.addColorStop(1, "#2980b9");
        ctx.fillStyle = grd;
        ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
        
        // Yeux stylés
        ctx.fillStyle = "white";
        ctx.fillRect(5, -10, 10, 10);
        ctx.fillStyle = "#2c3e50";
        ctx.fillRect(10, -7, 5, 5);
        
        ctx.restore();
    }
    update() {
        // Animation procédurale (lerp vers 1)
        this.stretch += (1 - this.stretch) * 0.2;
        this.squish += (1 - this.squish) * 0.2;
    }
}

class Level {
    constructor() {
        this.platforms = [];
        this.clouds = [];
        this.particles = [];
        this.goal = { x: 0, y: 0 };
    }
    generate() {
        this.platforms = [];
        this.clouds = [];
        let curX = 0;
        let curY = window.innerHeight - 150;
        
        // Première plateforme large
        this.platforms.push({ x: 0, y: curY, w: 500, h: 600 });

        for(let i=0; i<15; i++) {
            curX += 250 + Math.random() * 100;
            curY += (Math.random() - 0.5) * 200;
            curY = Math.max(200, Math.min(window.innerHeight - 100, curY));
            this.platforms.push({ x: curX, y: curY, w: 150 + Math.random() * 100, h: 600 });
            
            // Nuages en fond
            this.clouds.push({
                x: curX + Math.random() * 400,
                y: Math.random() * 200,
                s: 0.2 + Math.random() * 0.5
            });
        }
        const last = this.platforms[this.platforms.length - 1];
        this.goal = { x: last.x + 50, y: last.y - 100 };
    }
    draw() {
        // Dessin des nuages (Parallaxe)
        ctx.fillStyle = "rgba(255,255,255,0.1)";
        this.clouds.forEach(c => {
            ctx.beginPath();
            ctx.arc(c.x - camX * c.s, c.y, 40, 0, Math.PI * 2);
            ctx.arc(c.x + 30 - camX * c.s, c.y + 10, 30, 0, Math.PI * 2);
            ctx.fill();
        });

        // Dessin des plateformes
        this.platforms.forEach(p => {
            // Ombre portée
            ctx.fillStyle = "rgba(0,0,0,0.2)";
            ctx.fillRect(p.x - camX + 10, p.y + 10, p.w, p.h);
            // Bloc
            ctx.fillStyle = "#2c3e50";
            ctx.fillRect(p.x - camX, p.y, p.w, p.h);
            // Herbe neon
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(p.x - camX, p.y, p.w, 10);
        });

        // Drapeau
        ctx.fillStyle = "#e74c3c";
        ctx.fillRect(this.goal.x - camX, this.goal.y, 10, 100);
        ctx.beginPath();
        ctx.moveTo(this.goal.x - camX + 10, this.goal.y);
        ctx.lineTo(this.goal.x - camX + 60, this.goal.y + 25);
        ctx.lineTo(this.goal.x - camX + 10, this.goal.y + 50);
        ctx.fill();

        // Particules
        this.particles.forEach((p, i) => {
            p.update();
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - camX, p.y, 5, 5);
            if(p.life <= 0) this.particles.splice(i, 1);
        });
        ctx.globalAlpha = 1;
    }
}

const player = new Player();
const world = new Level();
const keys = { left: false, right: false };

function startGame() {
    document.getElementById('overlay').style.opacity = '0';
    setTimeout(() => document.getElementById('overlay').style.display = 'none', 300);
    score = 0;
    player.reset();
    world.generate();
    gameState = 'PLAYING';
    requestAnimationFrame(loop);
}

// Input Handlers
window.onkeydown = e => {
    if(e.code === 'ArrowLeft') keys.left = true;
    if(e.code === 'ArrowRight') keys.right = true;
    if(e.code === 'Space' || e.code === 'ArrowUp') jump();
};
window.onkeyup = e => {
    if(e.code === 'ArrowLeft') keys.left = false;
    if(e.code === 'ArrowRight') keys.right = false;
};

// Touch Controls
const btnBind = (id, k) => {
    const el = document.getElementById(id);
    el.ontouchstart = (e) => { e.preventDefault(); if(k==='jump') jump(); else keys[k]=true; };
    el.ontouchend = () => { if(k!=='jump') keys[k]=false; };
};
btnBind('btn-left', 'left');
btnBind('btn-right', 'right');
btnBind('btn-jump', 'jump');

function jump() {
    if(player.onGround) {
        player.vy = config.jump;
        player.onGround = false;
        player.stretch = 0.6; player.squish = 1.4; // Effet étirement
        for(let i=0; i<8; i++) world.particles.push(new Particle(player.x+20, player.y+40, "#fff"));
    }
}

function update() {
    if(gameState !== 'PLAYING') return;

    if(keys.left) { player.vx = -config.speed; player.dir = -1; }
    else if(keys.right) { player.vx = config.speed; player.dir = 1; }
    else { player.vx *= config.friction; }

    player.vy += config.gravity;
    player.x += player.vx;
    player.y += player.vy;
    
    player.update();

    let grounded = false;
    world.platforms.forEach(p => {
        if(player.x + player.w > p.x && player.x < p.x + p.w &&
           player.y + player.h > p.y && player.y + player.h < p.y + 50 && player.vy > 0) {
            if(!player.onGround) { // Atterrissage
                player.squish = 0.7; player.stretch = 1.3;
            }
            player.y = p.y - player.h;
            player.vy = 0;
            grounded = true;
        }
    });
    player.onGround = grounded;

    // Camera follow (Lerp)
    let targetCam = player.x - canvas.width/4;
    camX += (targetCam - camX) * 0.1;

    // Win condition
    if(player.x > world.goal.x) {
        alert("VICTOIRE ! Score : " + Math.round(player.x));
        gameState = 'MENU';
        location.reload();
    }

    // Death
    if(player.y > canvas.height + 100) {
        gameState = 'MENU';
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('overlay').style.opacity = '1';
        document.querySelector('.title').innerText = "GAME OVER";
    }
    
    score = Math.max(score, Math.floor(player.x));
    document.getElementById('score-val').innerText = score;
}

function loop() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Background gradient
    const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
    sky.addColorStop(0, "#1a1a2e");
    sky.addColorStop(1, "#16213e");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    update();
    world.draw();
    player.draw();

    if(gameState === 'PLAYING') requestAnimationFrame(loop);
}
</script>
</body>
  </html>
